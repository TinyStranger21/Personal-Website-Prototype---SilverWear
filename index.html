<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver Wear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Island+Moments&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-home">
  <div class="sky-background"></div>

  <nav class="nav-bar">
    <a href="custom.html" class="nav-link nav-link-active">Custom</a>
    <a href="premade.html" class="nav-link">Premade</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="#contact" class="nav-link">Contact</a>
  </nav>

  <main class="hero">
    <h1 class="brand-title">
      <span class="title-line">Silver</span>
      <span class="title-line">Wear</span>
    </h1>

    <div class="rings-container" id="rings-container">
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-1.png" alt="Ornate silver cuff ring with scrollwork">
        </div>
      </div>
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-2.png" alt="Spoon ring with floral engraving">
        </div>
      </div>
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-3.png" alt="Floral engraved silver ring on hand">
        </div>
      </div>
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-4.png" alt="Wide band etched silver ring">
        </div>
      </div>
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-5.png" alt="Antique spoon ring with floral design">
        </div>
      </div>
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-6.png" alt="Ornate silver ring with scrollwork">
        </div>
      </div>
      <div class="ring-holder ring-holder-square">
        <span class="ring-label"></span>
        <div class="ring-img-wrap">
          <img src="images/ring-7.png" alt="Silver ring with floral and beaded bands">
        </div>
      </div>
    </div>
  </main>

  <!-- Lightbox for ring details on click -->
  <div id="lightbox" class="lightbox" aria-hidden="true">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightbox-img">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
